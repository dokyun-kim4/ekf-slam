beacon_node:
  ros__parameters:
    beacon_ids: [1, 2, 3]
    beacon_x_pos: [1.0, 3.0, -0.5]
    beacon_y_pos: [1.5, -1.5, -1.0]
    range_noise: 0.1
    range_prop_noise: 0.05
    bearing_noise: 0.08
    max_range: 2.5
    interval: 2.0

noise_injector:
  ros__parameters:
    motor_linear_noise: 0.1
    motor_angular_noise: 0.05
    motor_interval: 0.2
  
    encoder_linear_noise: 0.05
    encoder_linear_noise_ratio: 0.01
    encoder_angular_noise: 0.02
    encoder_angular_noise_ratio: 0.1
    encoder_interval: 0.2

    gps_x_noise: 0.1
    gps_y_noise: 0.1
    gps_interval: 3.0
